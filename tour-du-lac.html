<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Tour du Lac - Véloc'Annecy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .gallery-img {
            width: 100%;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* Gestion du plein écran sur Mobile */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 0px;
                /* Supprime l'espace entre les deux images */
                width: 100vw;
                position: relative;
                left: 50%;
                right: 50%;
                margin-left: -50vw;
                margin-right: -50vw;
            }

            .gallery-img {
                border-radius: 0px;
                /* Supprime l'arrondi pour coller aux bords du téléphone */
                box-shadow: none;
            }
        }
    </style>
</head>

<body>
    <!-- En-tête / Navigation -->
    <header>
        <div class="container header-flex">
            <div class="logo">
                <a href="index.html"><img src="assets/logo_veloc.png" alt="Véloc'Annecy Logo" class="logo-img"></a>
            </div>

            <button class="burger-menu" id="burger-btn" aria-label="Ouvrir le menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav id="nav-menu">
                <a href="index.html#gamme">Nos Vélos</a>
                <a href="index.html#tarifs">Tarifs</a>
                <a href="index.html#assistance">Assistance</a>
                <div class="hero-buttons">
                    <a href="index.html#contact" class="btn-primary">Nous Trouver</a>
                    <a href="tel:+33648122184" class="btn-secondary">Réserver</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container section-padding">
        <h2 class="section-title">Préparez votre Tour du Lac</h2>
        <p class="section-subtitle">Découvrez l'itinéraire idéal et nos conseils pour une journée parfaite.</p>

        <!-- Grille d'images contenant la première photo et la photo supplémentaire -->
        <div class="gallery-grid">
            <img src="assets/carte.png" alt="Tour du lac d'Annecy - Vue principale" class="gallery-img">
            <img src="assets/explications.png" alt="Tour du lac d'Annecy - Vue supplémentaire" class="gallery-img">
        </div>

        <div class="hero-buttons" style="margin-top: 40px;text-align: center">
            <a href="index.html#tarifs" class="btn-primary">🚲 Estimer mon tarif & Réserver</a>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Véloc'Annecy - Tous droits réservés.</p>
            <p style="margin-top: 10px;">
                <a href="cgv.html" style="color: #64748b; text-decoration: underline; font-size: 0.85rem;">Conditions Générales de Vente (CGV)</a>
            </p>
        </div>
    </footer>

    <script src="burger_menu.js"></script>
</body>

</html>
